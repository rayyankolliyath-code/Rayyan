
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAYYAN AI CHAT</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
align-items:center;
}

/* TOP HEADER */
.header{
width:100%;
background:#111827;
padding:15px;
text-align:center;
font-size:22px;
color:#38bdf8;
font-weight:bold;
}

/* CHAT BOX */
.chat-box{
width:90%;
max-width:600px;
height:65vh;
background:#1e293b;
margin-top:20px;
border-radius:12px;
padding:10px;
overflow:auto;
}

/* INPUT AREA */
.input-area{
width:90%;
max-width:600px;
display:flex;
gap:10px;
margin-top:10px;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:8px;
}

button{
padding:12px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}
</style>

</head>

<body>

<div class="header">🤖 RAYYAN AI CHAT</div>

<div class="chat-box" id="chatBox"></div>

<div class="input-area">
<input id="userInput" placeholder="Ask anything (Malayalam / English)" />
<button onclick="voiceInput()">🎤</button>
<button onclick="askAI()">Send</button>
</div>

<script>
/* 🔥 AI FUNCTION */
async function askAI(){

let input = document.getElementById("userInput").value;
let box = document.getElementById("chatBox");

/* user message */
box.innerHTML += "<p><b>You:</b> "+input+"</p>";

document.getElementById("userInput").value="";

/* loading */
box.innerHTML += "<p>🤖 Thinking...</p>";

const apiKey = "AIzaSyCzG4KO7gm_ehcmH2MW3mUANJ2KAqMPHPQ";

const response = await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key="+apiKey,
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
contents:[{parts:[{text:input}]}]
})
}
);

const data = await response.json();

let reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "No response";

/* AI reply */
box.innerHTML += "<p><b>AI:</b> "+reply+"</p>";

box.scrollTop = box.scrollHeight;
}

/* 🎤 VOICE INPUT */
function voiceInput(){
let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

recognition.lang = "en-US";
recognition.start();

recognition.onresult = function(event){
document.getElementById("userInput").value =
event.results[0][0].transcript;
};
}
</script>

</body>
</html>
