<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edu Assistant</title><style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:radial-gradient(circle at top,#0a0f1f,#000);
    color:#fff;
    overflow-x:hidden;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    padding:15px;
    align-items:center;
    font-weight:bold;
}

/* TITLE FADE */
h1{
    text-align:center;
    opacity:0.1;
}

/* GLASS CARD */
.card{
    margin:20px;
    padding:25px;
    border-radius:25px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
    box-shadow:
    0 0 25px rgba(0,0,0,0.8),
    inset 0 0 20px rgba(255,255,255,0.05);
    transition:0.4s;
    animation:fade 0.5s ease;
}
.card:hover{
    transform:scale(1.03);
}

/* ICON */
.icon{
    width:70px;
    height:70px;
    border-radius:20px;
    background:linear-gradient(135deg,#6dd5ed,#f9d423);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    margin:auto;
}

/* TEXT */
.title{
    font-size:24px;
    font-weight:bold;
    text-align:center;
    margin-top:15px;
}
.sub{
    text-align:center;
    opacity:0.7;
}

/* BUTTON TEXT */
.open-btn{
    text-align:center;
    margin-top:15px;
    color:#f9d423;
    font-weight:bold;
}

/* BACK BUTTON */
.back{
    margin:10px;
    padding:10px;
    border-radius:10px;
    background:#111;
    display:inline-block;
}

/* ANIMATION */
@keyframes fade{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
}
</style></head><body><div class="header">Edu Assistant</div><h1>Edu Assistant</h1><div id="content"></div><script>

/* DATA (EDIT PDF LINKS HERE) */
const data = {
  10:{
    Maths:[
      {name:"Real Numbers", pdf:"pdfs/maths1.pdf"},
      {name:"Polynomials", pdf:"pdfs/maths2.pdf"}
    ],
    Science:[
      {name:"Chemical Reactions", pdf:"pdfs/science1.pdf"}
    ]
  }
};

/* HOME */
function home(){
    content.innerHTML=`
    <div class="card" onclick="medium('Malayalam')">
        <div class="icon">🌐</div>
        <div class="title">മലയാളം മീഡിയം</div>
        <div class="sub">Class 1 to 10 • SCERT Kerala</div>
        <div class="open-btn">തുറക്കുക →</div>
    </div>

    <div class="card" onclick="medium('English')">
        <div class="icon">📘</div>
        <div class="title">English Medium</div>
        <div class="sub">Class 1 to 10 • SCERT Kerala</div>
        <div class="open-btn">Open →</div>
    </div>
    `;
}

/* MEDIUM */
function medium(m){
    let html='<div class="back" onclick="home()">⬅ Back</div>';
    html += "<h2 style='text-align:center'>Select Class</h2>";

    for(let i=1;i<=12;i++){
        html += `
        <div class="card" onclick="selectClass(${i})">
            <div class="title">Class ${i}</div>
        </div>`;
    }

    content.innerHTML=html;
}

/* CLASS */
function selectClass(c){
    if(!data[c]){
        content.innerHTML="<div class='back' onclick='home()'>⬅ Back</div><p style='text-align:center'>No data</p>";
        return;
    }

    let html='<div class="back" onclick="home()">⬅ Back</div>';
    html += "<h2 style='text-align:center'>Subjects</h2>";

    for(let sub in data[c]){
        html += `
        <div class="card" onclick="subject(${c},'${sub}')">
            <div class="title">${sub}</div>
        </div>`;
    }

    content.innerHTML=html;
}

/* SUBJECT */
function subject(c,s){
    let html='<div class="back" onclick="home()">⬅ Back</div>';
    html += "<h2 style='text-align:center'>Chapters</h2>";

    data[c][s].forEach(ch=>{
        html += `
        <div class="card">
            <div class="title">${ch.name}</div>
            <a href="${ch.pdf}" download>
            <div class="open-btn">📥 Download PDF</div>
            </a>
        </div>`;
    });

    content.innerHTML=html;
}

/* INIT */
home();

</script></body>
</html>
