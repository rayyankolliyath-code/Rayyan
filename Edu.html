<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edu Assistant</title><style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#000,#111);
    color:#fff;
    text-align:center;
    overflow-x:hidden;
}
h1{
    opacity:0.2;
    margin-top:20px;
}
.container{
    padding:20px;
}

/* Buttons */
button{
    padding:15px;
    margin:10px;
    width:85%;
    border:none;
    border-radius:12px;
    background:#111;
    color:white;
    font-size:16px;
    box-shadow:0 0 10px #00f;
    transition:0.3s;
}
button:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px #00f;
}

/* Cards */
.card{
    background:rgba(255,255,255,0.05);
    margin:15px;
    padding:15px;
    border-radius:15px;
    backdrop-filter:blur(10px);
    animation:fadeIn 0.6s ease;
}

/* Animations */
.fade{
    animation:fadeIn 0.5s ease;
}
@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}
</style></head><body><h1>Edu Assistant</h1><div class="container">
<h2 id="title">Welcome to Edu Assistant</h2><button id="startBtn" onclick="start()">Start Learning</button>

<div id="content"></div>
</div><script>

/* SAMPLE DATA (EDIT THIS WITH REAL PDF LINKS) */
const data = {
  10: {
    Maths: [
      {name:"Chapter 1: Real Numbers", pdf:"pdfs/maths1.pdf"},
      {name:"Chapter 2: Polynomials", pdf:"pdfs/maths2.pdf"}
    ],
    Science: [
      {name:"Chapter 1: Chemical Reactions", pdf:"pdfs/science1.pdf"}
    ]
  }
};

/* Start */
function start(){
    startBtn.style.display="none";
    title.innerText="Select Medium";

    content.innerHTML=`
    <button onclick="medium('Malayalam')">Malayalam Medium</button>
    <button onclick="medium('English')">English Medium</button>
    `;
}

/* Medium */
function medium(m){
    title.innerText="Select Class ("+m+")";

    let html="";
    for(let i=1;i<=12;i++){
        html += `<button onclick="selectClass(${i})">Class ${i}</button>`;
    }
    content.innerHTML=html;
}

/* Class */
function selectClass(c){
    title.innerText="Select Subject (Class "+c+")";

    if(!data[c]){
        content.innerHTML="<p>No data added yet</p>";
        return;
    }

    let html="";
    for(let sub in data[c]){
        html += `<button onclick="subject(${c},'${sub}')">${sub}</button>`;
    }
    content.innerHTML=html;
}

/* Subject */
function subject(c,s){
    title.innerText=s+" Chapters";

    let chapters=data[c][s];
    let html="";

    chapters.forEach(ch=>{
        html += `
        <div class="card">
            <h3>${ch.name}</h3>
            <a href="${ch.pdf}" download>
            <button>📥 Download PDF</button>
            </a>
        </div>`;
    });

    content.innerHTML=html;
}

</script></body>
</html>
